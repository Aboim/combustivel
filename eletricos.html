<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FuelSmart Portugal - Premium Directory">
    <title>FuelSmart Portugal</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        .btn-online {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 6px 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: 'Outfit'; font-weight: 600; font-size: 13px; transition: all 0.3s ease;
        }
        .btn-online:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
</head>
<body>
    <div class="app-container">
        <!-- App Navigation -->
        <div class="app-navigation" style="display: flex; justify-content: center; gap: 15px; padding: 20px 0 10px 0;">
            <a href="index.html" class="nav-tab" style="padding: 10px 24px; background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7); border-radius: 30px; text-decoration: none; font-weight: 600; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s ease; display: flex; align-items: center; gap: 8px;"><span class="material-icons-outlined" style="font-size: 20px;">local_gas_station</span> Combustíveis</a>
            <a href="eletricos.html" class="nav-tab active" style="padding: 10px 24px; background: #10b981; color: white; border-radius: 30px; text-decoration: none; font-weight: 600; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); display: flex; align-items: center; gap: 8px;"><span class="material-icons-outlined" style="font-size: 20px;">ev_station</span> Elétricos</a>
        </div>

        <!-- Header -->
        <header class="glass-header">
            <div class="header-top">
                <div class="logo-section">
                    <div class="logo-icon" style="color: #10b981;"><span class="material-icons-outlined">ev_station</span></div>
                    <div class="logo-text">
                        <h1>EV<span class="highlight" style="color: #10b981;">Smart</span></h1>
                        <span class="subtitle">POSTOS DE CARREGAMENTO</span>
                    </div>
                </div>
                <div class="search-section">
                    <span class="material-icons-outlined search-icon">search</span>
                    <input type="text" id="searchInput" placeholder="Pesquisar posto, marca ou localidade...">
                </div>
            </div>
            
            <div class="header-filters">
                <div class="fuel-types" id="fuelTypes">
                    <!-- Fuel type buttons will be generated by JS -->
                </div>
                
                <div class="dropdown-filters">
                    <select id="districtSelect" class="premium-select"></select>
                    <select id="municipalitySelect" class="premium-select"></select>
                    <select id="parishSelect" class="premium-select"></select>
                    <select id="brandSelect" class="premium-select"></select>
                    <select id="sortSelect" class="premium-select">
                        <option value="status">Estado (Disp./Ocup.)</option>
                        <option value="brand">Marca</option>
                    </select>
                </div>
            </div>
        </header>

        <!-- Dashboard Stats -->
        <div class="dashboard-stats">
            <div class="stat-box">
                <span class="stat-label">TOTAL DE POSTOS</span>
                <span class="stat-value" id="totalStations">0</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-box">
                <span class="stat-label">DISPONÍVEIS AGORA</span>
                <span class="stat-value highlight-green" id="availableStations">0</span>
            </div>
            <div class="spacer"></div>
            <div class="stat-right" style="display: flex; align-items: center; gap: 15px;">
                <button id="btnAtualizarOnline" class="btn-online">
                    <span class="material-icons-outlined" style="font-size: 16px;">sync</span>
                    Atualizar Online
                </button>
                <span class="results-count" id="resultsCount">0 Resultados</span>
                <div class="badge">
                    <span class="material-icons-outlined badge-icon">verified</span>
                    <span>DADOS OFICIAIS DGEG / ONLINE</span>
                </div>
            </div>
        </div>

        <!-- View Toggle -->
        <div style="padding: 0 40px; display: flex; justify-content: space-between; align-items: center;">
            <button id="btnGeoloc" class="geoloc-btn" title="Usar a minha localização">
                <span class="material-icons-outlined" style="font-size:16px;">my_location</span>
                Localização
            </button>
            <div class="view-toggle">
                <button class="view-btn active" id="btnGrid"><span class="material-icons-outlined">grid_view</span></button>
                <button class="view-btn" id="btnMap"><span class="material-icons-outlined">map</span></button>
            </div>
        </div>

        <!-- Grid -->
        <main class="grid-container" id="resultsGrid">
            <!-- Station cards will be generated here -->
        </main>
        
        <!-- Map -->
        <div class="map-container" id="mapContainer" style="display: none;">
            <div id="map" style="width: 100%; height: 100%;"></div>
        </div>

    </div>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="common.js?v=2"></script>
    <script src="ev_app.js?v=2"></script>
</body>
</html>
